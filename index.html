<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ProAV Scheduler</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --green:#6ABF2E;--green-dark:#52a01e;--black:#111111;--grey-900:#1a1a1a;
  --grey-700:#444;--grey-400:#999;--grey-200:#e5e5e5;--grey-100:#f5f5f5;
  --white:#ffffff;--red:#E24B4A;--radius:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:var(--grey-100);color:var(--grey-900);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* Auth */
#authScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--black);padding:1.5rem;gap:2rem}
.auth-logo{display:flex;align-items:center;gap:3px;font-size:36px;font-weight:700;letter-spacing:-1px}
.auth-logo .pro{color:var(--white)}.auth-logo .av{color:var(--green)}
.auth-logo sup{font-size:13px;color:#555;font-weight:500;margin-left:2px;align-self:flex-start;margin-top:5px}
.auth-sub{font-size:14px;color:var(--grey-400);letter-spacing:0.05em;text-transform:uppercase;font-weight:500;margin-top:-12px}
.auth-card{background:var(--grey-900);border-radius:16px;border:1px solid #2a2a2a;padding:2rem;width:100%;max-width:360px}
.auth-card .field{margin-bottom:14px}
.auth-card label{font-size:12px;font-weight:600;color:var(--grey-400);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em}
.auth-card input{width:100%;font-size:15px;padding:11px 14px;background:#222;border:1px solid #333;border-radius:var(--radius);outline:none;color:var(--white);font-family:inherit}
.auth-card input:focus{border-color:var(--green)}
.auth-card input::placeholder{color:#555}
.auth-err{font-size:13px;color:var(--red);margin-top:6px;min-height:18px}
.auth-btn{width:100%;margin-top:8px;padding:12px;background:var(--green);color:var(--white);border:none;border-radius:var(--radius);font-size:15px;cursor:pointer;font-weight:600;font-family:inherit}
.auth-btn:hover{background:var(--green-dark)}

/* App */
#appScreen{display:none;min-height:100vh}
.topbar{background:var(--black);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:2px;font-size:22px;font-weight:700;letter-spacing:-0.5px}
.logo .pro{color:var(--white)}.logo .av{color:var(--green)}
.logo sup{font-size:9px;color:#555;font-weight:500;margin-left:1px;align-self:flex-start;margin-top:3px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-label{font-size:12px;font-weight:500;color:var(--grey-400);letter-spacing:0.08em;text-transform:uppercase;margin-left:12px;padding-left:12px;border-left:1px solid #333}
.main{padding:1.25rem 1.5rem 3rem}
.cal-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.cal-toolbar-left{display:flex;align-items:center;gap:8px;flex:1}
.month-display{font-size:18px;font-weight:600;color:var(--black);min-width:160px}
.nav-btn{background:var(--white);border:1px solid var(--grey-200);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--grey-700);transition:all 0.15s;flex-shrink:0}
.nav-btn:hover{border-color:var(--green);color:var(--green)}
.cal-toolbar-right{display:flex;align-items:center;gap:8px}
.btn-primary{background:var(--green);color:var(--white);border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background 0.15s}
.btn-primary:hover{background:var(--green-dark)}
.btn-ghost{background:var(--white);border:1px solid var(--grey-200);border-radius:8px;padding:7px 14px;font-size:13px;color:var(--grey-700);cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-ghost:hover{border-color:var(--grey-400)}
.search-wrap{position:relative;min-width:160px;max-width:220px;flex:1}
.search-wrap input{width:100%;font-size:13px;padding:7px 10px 7px 32px;border:1px solid var(--grey-200);border-radius:8px;outline:none;background:var(--white);font-family:inherit;color:var(--grey-900)}
.search-wrap input:focus{border-color:var(--green)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--grey-400);font-size:13px;pointer-events:none}
#searchDropdown{display:none;position:absolute;top:38px;left:0;width:310px;max-width:90vw;background:var(--white);border:1px solid var(--grey-200);border-radius:12px;box-shadow:var(--shadow-lg);z-index:500;max-height:280px;overflow-y:auto}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:0.75rem}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--grey-700);font-weight:500}
.legend-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cat-note{font-size:10px;color:var(--grey-400);font-weight:400}

/* Filter bar */
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;align-items:center}
.filter-section-label{font-size:11px;font-weight:700;color:var(--grey-400);text-transform:uppercase;letter-spacing:0.07em}
.filter-divider{width:1px;height:20px;background:var(--grey-200);margin:0 4px;flex-shrink:0}
.filter-btn{border:1px solid var(--grey-200);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;cursor:pointer;background:var(--white);color:var(--grey-700);font-family:inherit;display:flex;align-items:center;gap:5px;transition:all 0.15s}
.filter-btn:hover{border-color:var(--grey-400)}
.filter-btn.active{color:var(--white);border-color:transparent}
.filter-clear{border:none;background:none;font-size:12px;color:var(--grey-400);cursor:pointer;font-family:inherit;padding:4px 8px;font-weight:600}
.filter-clear:hover{color:var(--red)}

/* Desktop calendar */
.cal-wrap{background:var(--white);border-radius:14px;border:1px solid var(--grey-200);overflow:hidden;box-shadow:var(--shadow)}
.cal-desktop{width:100%;border-collapse:collapse}
.cal-desktop th{font-size:11px;color:var(--grey-400);padding:10px 8px;text-align:center;border-bottom:1px solid var(--grey-200);font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
.cal-desktop td{vertical-align:top;border-right:1px solid var(--grey-200);border-bottom:1px solid var(--grey-200);padding:6px;height:96px;width:calc(100%/7);cursor:pointer;transition:background 0.1s}
.cal-desktop td:last-child{border-right:none}
.cal-desktop tr:last-child td{border-bottom:none}
.cal-desktop td:hover{background:#f9fff5}
.day-num{font-size:12px;font-weight:500;color:var(--grey-400);margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.day-num.today{background:var(--green);color:var(--white);font-weight:700}
.day-num.other-month{color:var(--grey-200)}
.job-bar{font-size:10px;font-weight:500;border-radius:5px;padding:2px 6px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.job-bar:hover{opacity:0.8}

/* Mobile */
.cal-mobile{display:none}
.view-toggle{display:flex;gap:4px;background:var(--grey-100);border-radius:8px;padding:3px;border:1px solid var(--grey-200)}
.view-toggle button{border:none;background:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--grey-400);font-family:inherit;transition:all 0.15s}
.view-toggle button.active{background:var(--white);color:var(--black);box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.cal-mobile-wrap{background:var(--white);border-radius:14px;border:1px solid var(--grey-200);overflow:hidden;box-shadow:var(--shadow);padding:12px}
.cal-mobile-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-mobile-header span{text-align:center;font-size:10px;font-weight:700;color:var(--grey-400);padding:4px 0;text-transform:uppercase;letter-spacing:0.06em}
.cal-mobile-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-mobile-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;flex-direction:column;gap:3px}
.cnum{font-size:14px;font-weight:500;color:var(--grey-900);line-height:1}
.cal-mobile-cell.other-month .cnum{color:var(--grey-200)}
.cal-mobile-cell.today .cnum{background:var(--green);color:var(--white);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.cal-mobile-cell.selected{background:#f0fbe6}
.cal-mobile-cell.selected .cnum{color:var(--green);font-weight:700}
.cal-mobile-cell.selected.today .cnum{background:var(--green);color:var(--white)}
.cal-mobile-cell.team-full{outline:2px solid var(--red);border-radius:8px}
.cal-mobile-dots{display:flex;gap:2px;justify-content:center}
.cal-mobile-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.cal-month-wrap{background:var(--white);border-radius:14px;border:1px solid var(--grey-200);overflow:hidden;box-shadow:var(--shadow)}
.cal-month-table{width:100%;border-collapse:collapse}
.cal-month-table th{font-size:9px;color:var(--grey-400);padding:7px 2px;text-align:center;border-bottom:1px solid var(--grey-200);font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.cal-month-table td{vertical-align:top;border-right:1px solid var(--grey-100);border-bottom:1px solid var(--grey-100);padding:3px 2px;width:calc(100%/7);cursor:pointer;min-height:52px}
.cal-month-table td:last-child{border-right:none}
.cal-month-table tr:last-child td{border-bottom:none}
.mo-num{font-size:10px;font-weight:500;color:var(--grey-400);width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px}
.mo-num.today{background:var(--green);color:var(--white);font-weight:700}
.mo-num.other-month{color:var(--grey-200)}
.mo-bar{font-size:8px;font-weight:500;border-radius:3px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.day-panel{margin-top:12px}
.day-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.day-panel-title{font-size:15px;font-weight:600;color:var(--black)}
.day-panel-empty{font-size:14px;color:var(--grey-400);padding:20px 0;text-align:center}
.day-card{background:var(--white);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border:1px solid var(--grey-200);border-left:4px solid var(--grey-200);box-shadow:var(--shadow)}
.day-card-title{font-size:14px;font-weight:600;color:var(--black);margin-bottom:5px}
.day-card-meta{font-size:12px;color:var(--grey-400);display:flex;flex-wrap:wrap;gap:8px}
.conflict-panel{background:var(--white);border:1px solid var(--grey-200);border-radius:14px;padding:1.1rem 1.25rem;margin-top:1rem;box-shadow:var(--shadow)}
.conflict-panel h3{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px;color:var(--black);text-transform:uppercase;letter-spacing:0.05em}
.conflict-item{font-size:13px;color:var(--grey-700);padding:6px 0;border-bottom:1px solid var(--grey-100)}
.conflict-item:last-child{border-bottom:none}
.no-conflicts{font-size:13px;color:var(--grey-400);font-style:italic}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--white);border-radius:16px;padding:1.75rem;width:430px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-box h3{font-size:17px;font-weight:700;margin-bottom:1.25rem;color:var(--black)}
.field{margin-bottom:14px}
.field label{font-size:11px;font-weight:700;color:var(--grey-400);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.07em}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:9px 12px;border:1px solid var(--grey-200);border-radius:var(--radius);outline:none;font-family:inherit;color:var(--grey-900);background:var(--white)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green)}
.field textarea{resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end}
.modal-btns button{font-size:14px;padding:9px 20px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--grey-200);background:var(--white);font-family:inherit;font-weight:500}
.modal-btns button:hover{background:var(--grey-100)}
.modal-btns .save-btn{background:var(--green);color:var(--white);border-color:var(--green);font-weight:600}
.modal-btns .save-btn:hover{background:var(--green-dark)}
.modal-btns .save-btn:disabled{background:var(--grey-200);border-color:var(--grey-200);color:var(--grey-400);cursor:not-allowed}
.modal-btns .del-btn{color:var(--red);border-color:#fdd}
.modal-btns .del-btn:hover{background:#fff5f5}
.view-row{display:flex;flex-direction:column;gap:2px;padding:8px 0;border-bottom:1px solid var(--grey-100)}
.view-row:last-child{border-bottom:none}
.view-label{font-size:11px;font-weight:700;color:var(--grey-400);text-transform:uppercase;letter-spacing:0.07em}
.view-value{font-size:14px;color:var(--grey-900);font-weight:500}
.notes-box{margin-top:4px;padding:10px 12px;background:var(--grey-100);border-radius:8px;font-size:13px;color:var(--grey-700);line-height:1.6}

@media(max-width:768px){
  .topbar{padding:0 1rem;height:52px}
  .topbar-label{display:none}
  .main{padding:1rem 0.875rem 4rem}
  .cal-toolbar{gap:8px;margin-bottom:0.875rem}
  .month-display{font-size:16px;min-width:130px}
  .search-wrap{max-width:100%;order:5;flex-basis:100%}
  .cal-wrap{display:none}
  .cal-mobile{display:block}
  .modal-overlay{align-items:flex-end}
  .modal-box{border-radius:20px 20px 0 0;width:100%;max-width:100%;padding:1.5rem 1.25rem 2.5rem}
  .field input,.field select,.field textarea{font-size:16px;padding:11px 13px}
  .modal-btns button{padding:11px 20px;font-size:15px}
}
</style>
</head>
<body>

<div id="authScreen">
  <div style="text-align:center">
    <div class="auth-logo"><span class="pro">pro</span><span class="av">AV</span><sup>®</sup></div>
    <div class="auth-sub">Team Scheduler</div>
  </div>
  <div class="auth-card">
    <div class="field"><label>Email</label><input type="email" id="authEmail" placeholder="you@proav.com"></div>
    <div class="field"><label>Password</label><input type="password" id="authPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')signIn()"></div>
    <div class="auth-err" id="authErr"></div>
    <button class="auth-btn" onclick="signIn()">Sign in</button>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <div class="logo"><span class="pro">pro</span><span class="av">AV</span><sup>®</sup></div>
      <span class="topbar-label">Team Scheduler</span>
    </div>
    <div class="topbar-right">
      <button class="btn-ghost" onclick="signOut()" style="font-size:12px;padding:6px 12px">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="cal-toolbar">
      <div class="cal-toolbar-left">
        <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <span class="month-display" id="monthLabel"></span>
        <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="cal-toolbar-right">
        <div class="search-wrap">
          <span class="search-icon">&#128269;</span>
          <input type="text" id="searchInput" placeholder="Search jobs, SEQF, PM..." oninput="onSearch()">
          <div id="searchDropdown"></div>
        </div>
        <button id="addJobBtn" class="btn-primary" onclick="openAddModal()">+ Add job</button>
      </div>
    </div>

    <div class="legend" id="legend"></div>
    <div class="filter-bar" id="filterBar"></div>

    <div class="cal-wrap">
      <table class="cal-desktop">
        <thead><tr><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th></tr></thead>
        <tbody id="calBody"></tbody>
      </table>
    </div>

    <div class="cal-mobile" id="calMobile">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-size:12px;font-weight:600;color:var(--grey-400);text-transform:uppercase;letter-spacing:0.06em">View</span>
        <div class="view-toggle">
          <button id="btnDetail" class="active" onclick="setMobileView('detail')">Detail</button>
          <button id="btnMonth" onclick="setMobileView('month')">Month</button>
        </div>
      </div>
      <div id="detailView">
        <div class="cal-mobile-wrap">
          <div class="cal-mobile-header">
            <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
          </div>
          <div class="cal-mobile-grid" id="calMobileGrid"></div>
        </div>
        <div class="day-panel" id="dayPanel">
          <div class="day-panel-header">
            <span class="day-panel-title" id="dayPanelTitle"></span>
            <button id="dayPanelAdd" class="btn-primary" style="font-size:12px;padding:6px 12px">+ Add job</button>
          </div>
          <div id="dayPanelJobs"></div>
        </div>
      </div>
      <div id="monthView" style="display:none">
        <div class="cal-month-wrap">
          <table class="cal-month-table">
            <thead><tr><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th><th>S</th></tr></thead>
            <tbody id="monthViewBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="conflict-panel">
      <h3>&#9888; Double assignments <span id="conflictCount" style="font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600;text-transform:none;letter-spacing:0"></span></h3>
      <div id="conflictList"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="viewOverlay">
  <div class="modal-box">
    <h3 id="viewTitle"></h3>
    <div id="viewBody"></div>
    <div class="modal-btns"><button id="viewCloseBtn">Close</button></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitle">Add job</h3>
    <div class="field"><label>Job name</label><input type="text" id="fName" placeholder="e.g. AV install – Main Hall"></div>
    <div class="field"><label>SEQF number</label><input type="text" id="fSeqf" placeholder="e.g. SEQF-1234"></div>
    <div class="field"><label>Category</label><select id="fCat"></select></div>
    <div class="field"><label>Assigned to</label><select id="fPerson"></select></div>
    <div class="field"><label>Project manager</label><input type="text" id="fPm" placeholder="e.g. Jane Smith"></div>
    <div class="field"><label>Start date</label><input type="date" id="fStart"></div>
    <div class="field"><label>End date</label><input type="date" id="fEnd"></div>
    <div class="field"><label>Notes</label><textarea id="fNotes" rows="3" placeholder="e.g. Bring spare cables, client contact is John..."></textarea></div>
    <div class="modal-btns">
      <button id="delBtn" class="del-btn" style="display:none;margin-right:auto" onclick="confirmDelete()">Delete</button>
      <button id="cancelBtn">Cancel</button>
      <button id="saveBtn" class="save-btn">Save</button>
    </div>
    <div id="delConfirm" style="display:none;margin-top:12px;padding:12px;background:#fff5f5;border-radius:8px;border:1px solid #fdd;font-size:13px;color:var(--grey-700)">
      Are you sure you want to delete this job?
      <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
        <button onclick="document.getElementById('delConfirm').style.display='none'" style="border:1px solid var(--grey-200);background:var(--white);border-radius:8px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:13px">Cancel</button>
        <button onclick="deleteJob()" style="border:none;background:var(--red);color:var(--white);border-radius:8px;padding:6px 14px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600">Yes, delete</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://xtuexrktnzrwadgvqeaw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0dWV4cmt0bnpyd2FkZ3ZxZWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTE0MTcsImV4cCI6MjA5NDY4NzQxN30.h7r4T9sePBDyGGEQy_FOaWzk2EKjVPDyfzXe--7Rl4k';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const PEOPLE=['Unassigned','Ashton','Scott','Chris','Ross','Aidan','Alain'];
const CONFLICT_CHECK_PEOPLE=['Ashton','Chris','Ross','Aidan','Alain'];
const CATEGORIES=[
  {id:'work',   label:'Offsite work', color:'#F5C842',noConflict:false},
  {id:'witness',label:'Witness test', color:'#6ABF2E',noConflict:true},
  {id:'leave',  label:'Annual leave', color:'#E24B4A',noConflict:false},
];
function getCat(id){return CATEGORIES.find(c=>c.id===id)||CATEGORIES[0]}

let jobs=[], bankHolidays=new Set(), curYear=new Date().getFullYear(), curMonth=new Date().getMonth()+1;
let selectedDate=fmt(new Date()), editingId=null, isAdmin=false, mobileView='detail';
let filterPeople=new Set(), filterCats=new Set();

async function loadBankHolidays(){
  try{
    const r=await fetch('https://www.gov.uk/bank-holidays.json');
    const d=await r.json();
    d['england-and-wales'].events.forEach(e=>bankHolidays.add(e.date));
  }catch(e){console.warn('Could not load bank holidays',e);}
}

// Swipe
let txStart=0;
document.getElementById('calMobile').addEventListener('touchstart',e=>txStart=e.touches[0].clientX,{passive:true});
document.getElementById('calMobile').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-txStart;
  if(Math.abs(dx)>50)changeMonth(dx<0?1:-1);
},{passive:true});

// Auth
async function signIn(){
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPass').value;
  document.getElementById('authErr').textContent='';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){document.getElementById('authErr').textContent=error.message;return;}
  showApp();
}
async function signOut(){
  await sb.auth.signOut();
  document.getElementById('appScreen').style.display='none';
  document.getElementById('authScreen').style.display='flex';
}
async function showApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  const{data:{user}}=await sb.auth.getUser();
  isAdmin=user?.user_metadata?.role==='admin';
  document.getElementById('addJobBtn').style.display=isAdmin?'':'none';
  await loadBankHolidays();
  await loadJobs();
  render();
}
sb.auth.onAuthStateChange((e,s)=>{if(s)showApp();});

// Data
async function loadJobs(){
  const{data,error}=await sb.from('jobs').select('*').order('start_date');
  if(!error)jobs=data.map(j=>({id:j.id,name:j.name,cat:j.cat,person:j.person,start:j.start_date,end:j.end_date,notes:j.notes,seqf:j.seqf,pm:j.pm}));
}

// Filters
function filteredJobs(dateJobs){
  if(filterPeople.size===0&&filterCats.size===0)return dateJobs;
  return dateJobs.filter(j=>{
    const pOk=filterPeople.size===0||filterPeople.has(j.person);
    const cOk=filterCats.size===0||filterCats.has(j.cat);
    return pOk&&cOk;
  });
}

function buildFilterBar(){
  const bar=document.getElementById('filterBar');
  bar.innerHTML='';
  const hasFilters=filterPeople.size>0||filterCats.size>0;

  // Team label
  const pl=document.createElement('span');pl.className='filter-section-label';pl.textContent='Team';bar.appendChild(pl);

  // People buttons
  PEOPLE.filter(p=>p!=='Unassigned').forEach(p=>{
    const active=filterPeople.has(p);
    const btn=document.createElement('button');
    btn.className='filter-btn'+(active?' active':'');
    btn.textContent=p;
    if(active)btn.style.background='#378ADD';
    btn.addEventListener('click',()=>{
      active?filterPeople.delete(p):filterPeople.add(p);
      render();
    });
    bar.appendChild(btn);
  });

  // Divider
  const div=document.createElement('div');div.className='filter-divider';bar.appendChild(div);

  // Type label
  const cl=document.createElement('span');cl.className='filter-section-label';cl.textContent='Type';bar.appendChild(cl);

  // Category buttons
  CATEGORIES.forEach(c=>{
    const active=filterCats.has(c.id);
    const btn=document.createElement('button');
    btn.className='filter-btn'+(active?' active':'');
    const dot=`<span style="width:8px;height:8px;border-radius:2px;background:${c.color};display:inline-block;flex-shrink:0"></span>`;
    btn.innerHTML=dot+c.label;
    if(active)btn.style.background=c.color==='#F5C842'?'#b8960a':c.color;
    btn.addEventListener('click',()=>{
      active?filterCats.delete(c.id):filterCats.add(c.id);
      render();
    });
    bar.appendChild(btn);
  });

  // Clear button
  if(hasFilters){
    const clr=document.createElement('button');
    clr.className='filter-clear';
    clr.textContent='✕ Clear';
    clr.addEventListener('click',()=>{filterPeople.clear();filterCats.clear();render();});
    bar.appendChild(clr);
  }
}

// Mobile view toggle
function setMobileView(v){
  mobileView=v;
  document.getElementById('btnDetail').classList.toggle('active',v==='detail');
  document.getElementById('btnMonth').classList.toggle('active',v==='month');
  document.getElementById('detailView').style.display=v==='detail'?'block':'none';
  document.getElementById('monthView').style.display=v==='month'?'block':'none';
}

// Modals
function openModal(){
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('delConfirm').style.display='none';
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
document.getElementById('cancelBtn').addEventListener('click',e=>{e.stopPropagation();closeModal();});
document.getElementById('saveBtn').addEventListener('click',saveJob);
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('viewCloseBtn').addEventListener('click',()=>document.getElementById('viewOverlay').classList.remove('open'));
document.getElementById('viewOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Add job';
  ['fName','fSeqf','fPm','fNotes'].forEach(id=>document.getElementById(id).value='');
  buildCatSelect(CATEGORIES[0].id);buildPersonSelect(PEOPLE[0]);
  const t=fmt(new Date());
  document.getElementById('fStart').value=t;document.getElementById('fEnd').value=t;
  document.getElementById('delBtn').style.display='none';
  document.getElementById('saveBtn').disabled=false;document.getElementById('saveBtn').textContent='Save';
  openModal();
}
function openAddModalDate(date){
  openAddModal();
  document.getElementById('fStart').value=date;document.getElementById('fEnd').value=date;
}
function openEditModal(id){
  editingId=id;const j=jobs.find(x=>x.id===id);
  document.getElementById('modalTitle').textContent='Edit job';
  document.getElementById('fName').value=j.name;document.getElementById('fSeqf').value=j.seqf||'';
  document.getElementById('fPm').value=j.pm||'';document.getElementById('fNotes').value=j.notes||'';
  buildCatSelect(j.cat||CATEGORIES[0].id);buildPersonSelect(j.person);
  document.getElementById('fStart').value=j.start;document.getElementById('fEnd').value=j.end;
  document.getElementById('delBtn').style.display='inline-block';
  document.getElementById('saveBtn').disabled=false;document.getElementById('saveBtn').textContent='Save';
  openModal();
}
function openViewModal(id){
  const j=jobs.find(x=>x.id===id);const cat=getCat(j.cat);
  document.getElementById('viewTitle').textContent=j.name;
  document.getElementById('viewBody').innerHTML=`
    ${j.seqf?`<div class="view-row"><div class="view-label">SEQF</div><div class="view-value">${j.seqf}</div></div>`:''}
    <div class="view-row"><div class="view-label">Category</div><div class="view-value" style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:3px;background:${cat.color};display:inline-block"></span>${cat.label}</div></div>
    <div class="view-row"><div class="view-label">Assigned to</div><div class="view-value">${j.person}</div></div>
    ${j.pm?`<div class="view-row"><div class="view-label">Project manager</div><div class="view-value">${j.pm}</div></div>`:''}
    <div class="view-row"><div class="view-label">Dates</div><div class="view-value">${j.start} – ${j.end}</div></div>
    ${j.notes?`<div class="view-row"><div class="view-label">Notes</div><div class="notes-box">${j.notes}</div></div>`:''}
  `;
  document.getElementById('viewOverlay').classList.add('open');
}

async function saveJob(){
  const btn=document.getElementById('saveBtn');if(btn.disabled)return;
  const name=document.getElementById('fName').value.trim();
  const seqf=document.getElementById('fSeqf').value.trim()||null;
  const cat=document.getElementById('fCat').value;
  const person=document.getElementById('fPerson').value;
  const pm=document.getElementById('fPm').value.trim()||null;
  const start=document.getElementById('fStart').value;
  const end=document.getElementById('fEnd').value;
  const notes=document.getElementById('fNotes').value.trim()||null;
  if(!name||!start||!end){alert('Please fill in all fields.');return;}
  if(start>end){alert('End date must be on or after start date.');return;}
  btn.disabled=true;btn.textContent='Saving...';closeModal();
  if(editingId){await sb.from('jobs').update({name,cat,person,start_date:start,end_date:end,notes,seqf,pm}).eq('id',editingId);}
  else{await sb.from('jobs').insert({name,cat,person,start_date:start,end_date:end,notes,seqf,pm});}
  await loadJobs();render();
}
function confirmDelete(){
  document.getElementById('delConfirm').style.display='block';
}
async function deleteJob(){
  document.getElementById('delConfirm').style.display='none';
  closeModal();
  await sb.from('jobs').delete().eq('id',editingId);
  await loadJobs();render();
}

// Helpers
function toDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function buildCatSelect(val){document.getElementById('fCat').innerHTML=CATEGORIES.map(c=>`<option value="${c.id}"${c.id===val?' selected':''}>${c.label}</option>`).join('')}
function buildPersonSelect(val){document.getElementById('fPerson').innerHTML=PEOPLE.map(p=>`<option${p===val?' selected':''}>${p}</option>`).join('')}
function changeMonth(d){
  curMonth+=d;
  if(curMonth>12){curMonth=1;curYear++}
  if(curMonth<1){curMonth=12;curYear--}
  selectedDate=fmt(new Date(curYear,curMonth-1,1));
  render();
}
function buildCells(){
  const first=new Date(curYear,curMonth-1,1);
  let dow=first.getDay();dow=dow===0?6:dow-1;
  const dim=new Date(curYear,curMonth,0).getDate();
  const pd=new Date(curYear,curMonth-1,0).getDate();
  let cells=[];
  for(let i=dow-1;i>=0;i--)cells.push({date:fmt(new Date(curYear,curMonth-2,pd-i)),other:true});
  for(let d=1;d<=dim;d++)cells.push({date:fmt(new Date(curYear,curMonth-1,d)),other:false});
  while(cells.length%7!==0)cells.push({date:fmt(new Date(curYear,curMonth,cells.length-dim-dow+1)),other:true});
  return cells;
}
function jobsForDate(date){return jobs.filter(j=>{const s=toDate(j.start),e=toDate(j.end),cd=toDate(date);return cd>=s&&cd<=e;})}
function isTeamFull(dj){const b=new Set(dj.map(j=>j.person));return CONFLICT_CHECK_PEOPLE.every(p=>b.has(p))}
function barLabel(j){return(j.seqf?j.seqf+' – ':'')+j.name+(j.notes?' 📋':'')+' ('+(j.person==='Unassigned'?'⚠':j.person)+')'}

// Render
function render(){
  document.getElementById('monthLabel').textContent=new Date(curYear,curMonth-1,1).toLocaleString('en-GB',{month:'long',year:'numeric'});
  buildFilterBar();
  renderDesktop();
  renderMobileDots();
  renderDayPanel();
  renderMobileMonth();
  buildLegend();
  renderConflicts();
}

function renderDesktop(){
  const tbody=document.getElementById('calBody');tbody.innerHTML='';
  const today=fmt(new Date());
  const cells=buildCells();
  for(let r=0;r<cells.length/7;r++){
    const tr=document.createElement('tr');
    for(let c=0;c<7;c++){
      const cell=cells[r*7+c];
      const td=document.createElement('td');
      const allDj=jobsForDate(cell.date);
      const dj=filteredJobs(allDj);
      if(isTeamFull(allDj))td.style.outline='2px solid var(--red)';
      if(bankHolidays.has(cell.date))td.style.background='#f0f7ff';
      td.addEventListener('click',()=>{if(isAdmin)openAddModalDate(cell.date);});
      const dn=document.createElement('div');
      dn.className='day-num'+(cell.other?' other-month':'')+(cell.date===today?' today':'');
      dn.textContent=parseInt(cell.date.split('-')[2]);
      if(bankHolidays.has(cell.date)){
        const bh=document.createElement('div');
        bh.style.cssText='font-size:9px;font-weight:600;color:#378ADD;margin-bottom:2px;text-transform:uppercase;letter-spacing:0.04em';
        bh.textContent='Bank Holiday';
        td.appendChild(dn);td.appendChild(bh);
      } else {
        td.appendChild(dn);
      }
      dj.forEach(j=>{
        const cat=getCat(j.cat);
        const bar=document.createElement('div');bar.className='job-bar';
        bar.style.background=cat.color+'28';
        bar.style.color=cat.color==='#F5C842'?'#7a6000':cat.color;
        bar.style.borderLeft=`3px solid ${cat.color}`;
        bar.textContent=barLabel(j);
        bar.addEventListener('click',e=>{e.stopPropagation();isAdmin?openEditModal(j.id):openViewModal(j.id);});
        td.appendChild(bar);
      });
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

function renderMobileDots(){
  const grid=document.getElementById('calMobileGrid');grid.innerHTML='';
  const today=fmt(new Date());
  buildCells().forEach(cell=>{
    const allDj=jobsForDate(cell.date);
    const dj=filteredJobs(allDj);
    const isBH=bankHolidays.has(cell.date);
    const div=document.createElement('div');
    div.className='cal-mobile-cell'+(cell.other?' other-month':'')+(cell.date===today?' today':'')+(cell.date===selectedDate?' selected':'')+(isTeamFull(allDj)?' team-full':'');
    if(isBH)div.style.background=cell.date===selectedDate?'#ddeeff':'#f0f7ff';
    const num=document.createElement('div');num.className='cnum';num.textContent=parseInt(cell.date.split('-')[2]);div.appendChild(num);
    if(isBH){
      const bd=document.createElement('div');
      bd.style.cssText='width:6px;height:6px;border-radius:50%;background:#378ADD;flex-shrink:0';
      const dots=document.createElement('div');dots.className='cal-mobile-dots';
      dots.appendChild(bd);
      [...new Set(dj.map(j=>getCat(j.cat).color))].slice(0,2).forEach(color=>{
        const dot=document.createElement('div');dot.className='cal-mobile-dot';dot.style.background=color;dots.appendChild(dot);
      });
      div.appendChild(dots);
    } else if(dj.length>0){
      const dots=document.createElement('div');dots.className='cal-mobile-dots';
      [...new Set(dj.map(j=>getCat(j.cat).color))].slice(0,3).forEach(color=>{
        const dot=document.createElement('div');dot.className='cal-mobile-dot';dot.style.background=color;dots.appendChild(dot);
      });
      div.appendChild(dots);
    }
    div.addEventListener('click',()=>{selectedDate=cell.date;renderMobileDots();renderDayPanel();});
    grid.appendChild(div);
  });
}

function renderMobileMonth(){
  const tbody=document.getElementById('monthViewBody');tbody.innerHTML='';
  const today=fmt(new Date());
  const cells=buildCells();
  for(let r=0;r<cells.length/7;r++){
    const tr=document.createElement('tr');
    for(let c=0;c<7;c++){
      const cell=cells[r*7+c];
      const td=document.createElement('td');
      const allDj=jobsForDate(cell.date);
      const dj=filteredJobs(allDj);
      if(isTeamFull(allDj))td.style.outline='2px solid var(--red)';
      td.addEventListener('click',()=>{selectedDate=cell.date;setMobileView('detail');renderMobileDots();renderDayPanel();});
      const dn=document.createElement('div');
      dn.className='mo-num'+(cell.other?' other-month':'')+(cell.date===today?' today':'');
      dn.textContent=parseInt(cell.date.split('-')[2]);
      td.appendChild(dn);
      dj.forEach(j=>{
        const cat=getCat(j.cat);
        const bar=document.createElement('div');bar.className='mo-bar';
        bar.style.background=cat.color+'33';
        bar.style.color=cat.color==='#F5C842'?'#7a6000':cat.color;
        bar.textContent=j.seqf||j.name;
        td.appendChild(bar);
      });
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

function renderDayPanel(){
  const d=toDate(selectedDate);
  document.getElementById('dayPanelTitle').textContent=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  const addBtn=document.getElementById('dayPanelAdd');
  addBtn.style.display=isAdmin?'':'none';
  addBtn.onclick=()=>openAddModalDate(selectedDate);
  const container=document.getElementById('dayPanelJobs');container.innerHTML='';
  if(bankHolidays.has(selectedDate)){
    const bh=document.createElement('div');
    bh.style.cssText='background:#f0f7ff;border-radius:12px;padding:10px 14px;margin-bottom:8px;border:1px solid #cce0ff;border-left:4px solid #378ADD;font-size:13px;font-weight:600;color:#378ADD';
    bh.textContent='🇬🇧 Bank Holiday';
    container.appendChild(bh);
  }
  const dj=filteredJobs(jobsForDate(selectedDate));
  if(!dj.length){container.innerHTML='<div class="day-panel-empty">No jobs scheduled</div>';return;}
  dj.forEach(j=>{
    const cat=getCat(j.cat);
    const card=document.createElement('div');card.className='day-card';card.style.borderLeftColor=cat.color;
    card.innerHTML=`<div class="day-card-title">${(j.seqf?j.seqf+' — ':'')+j.name+(j.notes?' 📋':'')}</div>
      <div class="day-card-meta">
        <span>👤 ${j.person==='Unassigned'?'⚠ Unassigned':j.person}</span>
        <span>🏷 ${cat.label}</span>
        ${j.pm?`<span>PM: ${j.pm}</span>`:''}
        <span>${j.start} – ${j.end}</span>
      </div>`;
    card.addEventListener('click',()=>isAdmin?openEditModal(j.id):openViewModal(j.id));
    container.appendChild(card);
  });
}

function renderConflicts(){
  const conflicts=[];
  const today=toDate(fmt(new Date()));
  const checkable=jobs.filter(j=>!getCat(j.cat).noConflict&&toDate(j.end)>=today);
  for(let i=0;i<checkable.length;i++){for(let k=i+1;k<checkable.length;k++){
    const a=checkable[i],b=checkable[k];if(a.person!==b.person)continue;
    const aS=toDate(a.start),aE=toDate(a.end),bS=toDate(b.start),bE=toDate(b.end);
    if(aS<=bE&&bS<=aE){const os=new Date(Math.max(aS,bS)),oe=new Date(Math.min(aE,bE));conflicts.push({person:a.person,job1:a.name,job2:b.name,from:fmt(os),to:fmt(oe)});}
  }}
  const list=document.getElementById('conflictList');
  const count=document.getElementById('conflictCount');
  count.textContent=conflicts.length+' issue'+(conflicts.length===1?'':'s');
  count.style.background=conflicts.length?'#fff0f0':'#f0fbe6';
  count.style.color=conflicts.length?'var(--red)':'var(--green-dark)';
  count.style.border=conflicts.length?'1px solid #fdd':'1px solid #c5e8a0';
  list.innerHTML=conflicts.length
    ?conflicts.map(c=>`<div class="conflict-item"><strong>${c.person}</strong>: <strong>${c.job1}</strong> and <strong>${c.job2}</strong> overlap ${c.from===c.to?'on '+c.from:'from '+c.from+' to '+c.to}</div>`).join('')
    :'<p class="no-conflicts">No double assignments — all clear.</p>';
}

function buildLegend(){
  const leg=document.getElementById('legend');leg.innerHTML='';
  CATEGORIES.forEach(c=>{
    const d=document.createElement('div');d.className='legend-item';
    d.innerHTML=`<span class="legend-swatch" style="background:${c.color}"></span>${c.label}${c.noConflict?'<span class="cat-note">(conflicts excluded)</span>':''}`;
    leg.appendChild(d);
  });
}

function onSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const dd=document.getElementById('searchDropdown');
  if(!q){dd.style.display='none';return;}
  const matches=jobs.filter(j=>j.name.toLowerCase().includes(q)||j.person.toLowerCase().includes(q)||(j.seqf&&j.seqf.toLowerCase().includes(q))||(j.pm&&j.pm.toLowerCase().includes(q))||(j.notes&&j.notes.toLowerCase().includes(q)));
  if(!matches.length){dd.innerHTML='<div style="padding:12px 14px;font-size:13px;color:var(--grey-400)">No jobs found</div>';dd.style.display='block';return;}
  dd.innerHTML=matches.map(j=>{
    const cat=getCat(j.cat);
    return`<div data-id="${j.id}" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--grey-100);display:flex;align-items:center;gap:10px">
      <span style="width:8px;height:8px;border-radius:2px;background:${cat.color};flex-shrink:0"></span>
      <div><div style="font-size:13px;font-weight:600;color:var(--black)">${j.name}${j.seqf?` <span style="font-size:11px;color:var(--grey-400);font-weight:400">${j.seqf}</span>`:''}</div>
      <div style="font-size:11px;color:var(--grey-400);margin-top:2px">${j.person}${j.pm?' · PM: '+j.pm:''} · ${j.start} to ${j.end}</div></div>
    </div>`;
  }).join('');
  dd.style.display='block';
  dd.querySelectorAll('[data-id]').forEach(el=>el.addEventListener('click',()=>jumpToJob(el.dataset.id)));
}

function jumpToJob(id){
  const j=jobs.find(x=>x.id===id);if(!j)return;
  const d=toDate(j.start);curYear=d.getFullYear();curMonth=d.getMonth()+1;selectedDate=j.start;
  document.getElementById('searchInput').value='';document.getElementById('searchDropdown').style.display='none';
  render();
  setTimeout(()=>{
    const bars=[...document.querySelectorAll('.job-bar,.day-card')];
    const bar=bars.find(b=>b.textContent.includes(j.name));
    if(bar){bar.scrollIntoView({behavior:'smooth',block:'center'});bar.style.outline='2px solid var(--green)';setTimeout(()=>bar.style.outline='',1500);}
  },50);
}

document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))document.getElementById('searchDropdown').style.display='none';});
</script>
