<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Team Scheduler</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,sans-serif;background:#fff;color:#1a1a1a;overflow-x:hidden}

/* ── Auth ── */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5;padding:1rem}
.auth-card{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:2rem;width:100%;max-width:360px}
.auth-card h2{font-size:18px;font-weight:500;margin-bottom:1.5rem;text-align:center}
.auth-card .err{font-size:13px;color:#E24B4A;margin-top:8px;min-height:18px}
.auth-card button{width:100%;margin-top:12px;padding:10px;background:#378ADD;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:500}
.auth-card button:hover{background:#185FA5}

/* ── App ── */
#appScreen{display:none;padding:0.75rem 1rem 3rem}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:8px;padding:0.5rem 0 0.75rem;flex-wrap:wrap}
.toolbar h2{font-size:17px;font-weight:600;flex:1;min-width:120px}
.nav-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:15px}
.nav-btn:hover{background:#f5f5f5}
.month-label{font-size:15px;font-weight:500;min-width:120px;text-align:center}
.add-btn{background:#378ADD;color:#fff;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap}
.add-btn:hover{background:#185FA5}
.signout-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;color:#888}
.signout-btn:hover{background:#f5f5f5}
.search-wrap{position:relative;flex:1;min-width:140px;max-width:220px}
.search-wrap input{font-size:14px;padding:6px 10px 6px 30px;border:1px solid #ddd;border-radius:8px;outline:none;width:100%}
.search-wrap input:focus{border-color:#378ADD}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#aaa;font-size:13px;pointer-events:none}
#searchDropdown{display:none;position:absolute;top:38px;left:0;width:300px;max-width:90vw;background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:500;max-height:260px;overflow-y:auto}

/* ── Legend ── */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:0.75rem}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#555}
.legend-swatch{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.cat-note{font-size:10px;color:#aaa;margin-left:2px}

/* ── Desktop calendar ── */
.cal-desktop{width:100%;border-collapse:collapse}
.cal-desktop th{font-size:12px;color:#666;padding:4px 6px;text-align:left;border-bottom:1px solid #eee;font-weight:500}
.cal-desktop td{vertical-align:top;border:1px solid #eee;padding:4px;height:90px;width:calc(100%/7);cursor:pointer}
.cal-desktop td:hover{background:#fafafa}
.day-num{font-size:12px;color:#888;margin-bottom:2px}
.day-num.today{background:#378ADD;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-weight:500}
.day-num.other-month{color:#ccc}
.job-bar{font-size:10px;border-radius:3px;padding:1px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}

/* ── Mobile calendar ── */
.cal-mobile{display:none;user-select:none}
.cal-mobile-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-mobile-header span{text-align:center;font-size:11px;font-weight:600;color:#aaa;padding:4px 0;text-transform:uppercase}
.cal-mobile-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-mobile-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;position:relative;flex-direction:column;gap:2px}
.cal-mobile-cell .cnum{font-size:15px;font-weight:400;color:#1a1a1a;line-height:1}
.cal-mobile-cell.other-month .cnum{color:#ccc}
.cal-mobile-cell.today .cnum{background:#378ADD;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px}
.cal-mobile-cell.selected .cnum{background:#1a1a1a;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px}
.cal-mobile-cell.selected.today .cnum{background:#378ADD}
.cal-mobile-cell.team-full{outline:2px solid #E24B4A;border-radius:6px}
.cal-mobile-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;max-width:28px}
.cal-mobile-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ── Day panel (mobile) ── */
.day-panel{display:none;margin-top:12px;border-top:1px solid #eee;padding-top:12px}
.day-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.day-panel-title{font-size:15px;font-weight:600;color:#1a1a1a}
.day-panel-add{background:#378ADD;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:500;cursor:pointer}
.day-panel-empty{font-size:14px;color:#aaa;padding:12px 0;text-align:center}
.day-card{background:#f9f9f9;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;border-left:4px solid #ddd;active:background:#f0f0f0}
.day-card:active{background:#f0f0f0}
.day-card-title{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:3px}
.day-card-meta{font-size:12px;color:#888;display:flex;flex-wrap:wrap;gap:6px}
.day-card-meta span{display:flex;align-items:center;gap:3px}

/* ── Conflict panel ── */
.conflict-panel{background:#f9f9f9;border:1px solid #eee;border-radius:12px;padding:1rem;margin-top:1rem}
.conflict-panel h3{font-size:14px;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.conflict-item{font-size:13px;color:#555;padding:5px 0;border-bottom:1px solid #eee}
.conflict-item:last-child{border-bottom:none}
.no-conflicts{font-size:13px;color:#888;font-style:italic}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:1.5rem;width:410px;max-width:96vw;max-height:92vh;overflow-y:auto}
.modal-box h3{font-size:16px;font-weight:500;margin-bottom:1rem}
.field{margin-bottom:12px}
.field label{font-size:13px;color:#666;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#378ADD}
.field textarea{resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end}
.modal-btns button{font-size:14px;padding:8px 18px;border-radius:8px;cursor:pointer;border:1px solid #ddd;background:#fff}
.modal-btns button:hover{background:#f5f5f5}
.modal-btns .save-btn{background:#378ADD;color:#fff;border-color:#378ADD}
.modal-btns .save-btn:hover{background:#185FA5}
.modal-btns .save-btn:disabled{background:#aaa;border-color:#aaa;cursor:not-allowed}
.modal-btns .del-btn{color:#E24B4A;border-color:#E24B4A}
.modal-btns .del-btn:hover{background:#fff5f5}

/* ── Mobile overrides ── */
@media(max-width:768px){
  #appScreen{padding:0.5rem 0.75rem 4rem}
  .toolbar{gap:6px}
  .toolbar h2{font-size:16px}
  .search-wrap{max-width:100%;order:5;flex-basis:100%}
  .cal-desktop{display:none}
  .cal-mobile{display:block}
  .day-panel{display:block}
  .modal-overlay{align-items:flex-end}
  .modal-box{border-radius:16px 16px 0 0;width:100%;max-width:100%;padding:1.25rem 1rem 2rem}
  .modal-box h3{font-size:17px}
  .field input,.field select,.field textarea{font-size:16px;padding:10px 12px}
  .modal-btns button{padding:10px 18px;font-size:15px}
}
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-card">
    <h2>Team Scheduler</h2>
    <div class="field"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input type="password" id="authPass" placeholder="Password" onkeydown="if(event.key==='Enter')signIn()"></div>
    <div class="err" id="authErr"></div>
    <button onclick="signIn()">Sign in</button>
  </div>
</div>

<div id="appScreen">
  <div class="toolbar">
    <h2>Team Scheduler</h2>
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    <button id="addJobBtn" class="add-btn" onclick="openAddModal()">+ Add job</button>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search jobs..." oninput="onSearch()">
      <div id="searchDropdown"></div>
    </div>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>
  <div class="legend" id="legend"></div>

  <!-- Desktop -->
  <table class="cal-desktop">
    <thead><tr><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th></tr></thead>
    <tbody id="calBody"></tbody>
  </table>

  <!-- Mobile -->
  <div class="cal-mobile" id="calMobile">
    <div class="cal-mobile-header">
      <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
    </div>
    <div class="cal-mobile-grid" id="calMobileGrid"></div>
  </div>

  <!-- Day panel (mobile) -->
  <div class="day-panel" id="dayPanel">
    <div class="day-panel-header">
      <span class="day-panel-title" id="dayPanelTitle">Select a day</span>
      <button class="day-panel-add" id="dayPanelAdd">+ Add job</button>
    </div>
    <div id="dayPanelJobs"></div>
  </div>

  <div class="conflict-panel">
    <h3>&#9888; Double assignments <span id="conflictCount" style="font-size:12px;padding:2px 8px;border-radius:12px;font-weight:400"></span></h3>
    <div id="conflictList"></div>
  </div>
</div>

<div class="modal-overlay" id="viewOverlay">
  <div class="modal-box">
    <h3 id="viewTitle">Job details</h3>
    <div id="viewBody" style="font-size:14px;line-height:1.8;color:#333"></div>
    <div class="modal-btns" style="margin-top:1.25rem">
      <button id="viewCloseBtn">Close</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitle">Add job</h3>
    <div class="field"><label>Job name</label><input type="text" id="fName" placeholder="e.g. AV install – Main Hall"></div>
    <div class="field"><label>SEQF number <span style="color:#aaa;font-weight:400">(optional)</span></label><input type="text" id="fSeqf" placeholder="e.g. SEQF-1234"></div>
    <div class="field"><label>Category</label><select id="fCat"></select></div>
    <div class="field"><label>Assigned to</label><select id="fPerson"></select></div>
    <div class="field"><label>Project manager <span style="color:#aaa;font-weight:400">(optional)</span></label><input type="text" id="fPm" placeholder="e.g. Jane Smith"></div>
    <div class="field"><label>Start date</label><input type="date" id="fStart"></div>
    <div class="field"><label>End date</label><input type="date" id="fEnd"></div>
    <div class="field"><label>Notes <span style="color:#aaa;font-weight:400">(optional)</span></label><textarea id="fNotes" rows="3" placeholder="e.g. Bring spare cables, client contact is John..."></textarea></div>
    <div class="modal-btns">
      <button id="delBtn" class="del-btn" style="display:none;margin-right:auto" onclick="deleteJob()">Delete</button>
      <button id="cancelBtn">Cancel</button>
      <button id="saveBtn" class="save-btn">Save</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://xtuexrktnzrwadgvqeaw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0dWV4cmt0bnpyd2FkZ3ZxZWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMTE0MTcsImV4cCI6MjA5NDY4NzQxN30.h7r4T9sePBDyGGEQy_FOaWzk2EKjVPDyfzXe--7Rl4k';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const PEOPLE=['Unassigned','Ashton','Scott','Chris','Ross','Aiden','Alain'];
const CONFLICT_CHECK_PEOPLE=['Ashton','Chris','Ross','Aiden','Alain'];
const CATEGORIES=[
  {id:'work',   label:'Offsite work', color:'#F5C842',noConflict:false},
  {id:'witness',label:'Witness test', color:'#E67E22',noConflict:true},
  {id:'leave',  label:'Annual leave', color:'#E24B4A',noConflict:false},
];
function getCat(id){return CATEGORIES.find(c=>c.id===id)||CATEGORIES[0]}

let jobs=[];
let curYear=new Date().getFullYear();
let curMonth=new Date().getMonth()+1;
let selectedDate=fmt(new Date());
let editingId=null;
let isAdmin=false;

// Touch swipe
let touchStartX=0;
document.getElementById('calMobile').addEventListener('touchstart',e=>touchStartX=e.touches[0].clientX,{passive:true});
document.getElementById('calMobile').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>50){changeMonth(dx<0?1:-1);}
},{passive:true});

// Auth
async function signIn(){
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPass').value;
  document.getElementById('authErr').textContent='';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){document.getElementById('authErr').textContent=error.message;return;}
  showApp();
}
async function signOut(){
  await sb.auth.signOut();
  document.getElementById('appScreen').style.display='none';
  document.getElementById('authScreen').style.display='flex';
}
async function showApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  const{data:{user}}=await sb.auth.getUser();
  isAdmin=user?.user_metadata?.role==='admin';
  // Show/hide admin controls
  document.getElementById('addJobBtn').style.display=isAdmin?'':'none';
  await loadJobs();
  render();
}
sb.auth.onAuthStateChange((e,s)=>{if(s)showApp();});

// Data
async function loadJobs(){
  const{data,error}=await sb.from('jobs').select('*').order('start_date');
  if(!error)jobs=data.map(j=>({id:j.id,name:j.name,cat:j.cat,person:j.person,start:j.start_date,end:j.end_date,notes:j.notes,seqf:j.seqf,pm:j.pm}));
}

// Modal
function openModal(){document.getElementById('modalOverlay').classList.add('open')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
document.getElementById('viewCloseBtn').addEventListener('click',()=>document.getElementById('viewOverlay').classList.remove('open'));
document.getElementById('viewOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

function openViewModal(id){
  const j=jobs.find(x=>x.id===id);
  const cat=getCat(j.cat);
  document.getElementById('viewTitle').textContent=j.name;
  document.getElementById('viewBody').innerHTML=`
    ${j.seqf?`<div><strong>SEQF:</strong> ${j.seqf}</div>`:''}
    <div><strong>Category:</strong> <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${cat.color};margin-right:4px;vertical-align:middle"></span>${cat.label}</div>
    <div><strong>Assigned to:</strong> ${j.person}</div>
    ${j.pm?`<div><strong>Project manager:</strong> ${j.pm}</div>`:''}
    <div><strong>Start:</strong> ${j.start}</div>
    <div><strong>End:</strong> ${j.end}</div>
    ${j.notes?`<div style="margin-top:8px;padding:8px 10px;background:#f9f9f9;border-radius:8px;border-left:3px solid #ddd"><strong>Notes:</strong><br>${j.notes}</div>`:''}
  `;
  document.getElementById('viewOverlay').classList.add('open');
}


document.getElementById('saveBtn').addEventListener('click',saveJob);
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Add job';
  document.getElementById('fName').value='';
  document.getElementById('fSeqf').value='';
  document.getElementById('fPm').value='';
  document.getElementById('fNotes').value='';
  buildCatSelect(CATEGORIES[0].id);
  buildPersonSelect(PEOPLE[0]);
  const t=fmt(new Date());
  document.getElementById('fStart').value=t;
  document.getElementById('fEnd').value=t;
  document.getElementById('delBtn').style.display='none';
  document.getElementById('saveBtn').disabled=false;
  document.getElementById('saveBtn').textContent='Save';
  openModal();
}
function openAddModalDate(date){
  openAddModal();
  document.getElementById('fStart').value=date;
  document.getElementById('fEnd').value=date;
}
function openEditModal(id){
  editingId=id;
  const j=jobs.find(x=>x.id===id);
  document.getElementById('modalTitle').textContent='Edit job';
  document.getElementById('fName').value=j.name;
  document.getElementById('fSeqf').value=j.seqf||'';
  document.getElementById('fPm').value=j.pm||'';
  document.getElementById('fNotes').value=j.notes||'';
  buildCatSelect(j.cat||CATEGORIES[0].id);
  buildPersonSelect(j.person);
  document.getElementById('fStart').value=j.start;
  document.getElementById('fEnd').value=j.end;
  document.getElementById('delBtn').style.display='inline-block';
  document.getElementById('saveBtn').disabled=false;
  document.getElementById('saveBtn').textContent='Save';
  openModal();
}

async function saveJob(){
  const btn=document.getElementById('saveBtn');
  if(btn.disabled)return;
  const name=document.getElementById('fName').value.trim();
  const seqf=document.getElementById('fSeqf').value.trim()||null;
  const cat=document.getElementById('fCat').value;
  const person=document.getElementById('fPerson').value;
  const pm=document.getElementById('fPm').value.trim()||null;
  const start=document.getElementById('fStart').value;
  const end=document.getElementById('fEnd').value;
  const notes=document.getElementById('fNotes').value.trim()||null;
  if(!name||!start||!end){alert('Please fill in all fields.');return;}
  if(start>end){alert('End date must be on or after start date.');return;}
  btn.disabled=true;btn.textContent='Saving...';
  closeModal();
  if(editingId){
    await sb.from('jobs').update({name,cat,person,start_date:start,end_date:end,notes,seqf,pm}).eq('id',editingId);
  } else {
    await sb.from('jobs').insert({name,cat,person,start_date:start,end_date:end,notes,seqf,pm});
  }
  await loadJobs();render();
}

async function deleteJob(){
  if(!confirm('Delete this job?'))return;
  closeModal();
  await sb.from('jobs').delete().eq('id',editingId);
  await loadJobs();render();
}

// Helpers
function toDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function buildCatSelect(val){document.getElementById('fCat').innerHTML=CATEGORIES.map(c=>`<option value="${c.id}"${c.id===val?' selected':''}>${c.label}</option>`).join('')}
function buildPersonSelect(val){document.getElementById('fPerson').innerHTML=PEOPLE.map(p=>`<option${p===val?' selected':''}>${p}</option>`).join('')}

function changeMonth(d){
  curMonth+=d;
  if(curMonth>12){curMonth=1;curYear++}
  if(curMonth<1){curMonth=12;curYear--}
  // keep selected date in view
  selectedDate=fmt(new Date(curYear,curMonth-1,1));
  render();
}

function buildCells(){
  const first=new Date(curYear,curMonth-1,1);
  let dow=first.getDay();dow=dow===0?6:dow-1;
  const dim=new Date(curYear,curMonth,0).getDate();
  const pd=new Date(curYear,curMonth-1,0).getDate();
  let cells=[];
  for(let i=dow-1;i>=0;i--)cells.push({date:fmt(new Date(curYear,curMonth-2,pd-i)),other:true});
  for(let d=1;d<=dim;d++)cells.push({date:fmt(new Date(curYear,curMonth-1,d)),other:false});
  while(cells.length%7!==0)cells.push({date:fmt(new Date(curYear,curMonth,cells.length-dim-dow+1)),other:true});
  return cells;
}

function jobsForDate(date){
  return jobs.filter(j=>{const s=toDate(j.start),e=toDate(j.end),cd=toDate(date);return cd>=s&&cd<=e;});
}
function isTeamFull(dayJobs){
  const busy=new Set(dayJobs.map(j=>j.person));
  return CONFLICT_CHECK_PEOPLE.every(p=>busy.has(p));
}

function render(){
  document.getElementById('monthLabel').textContent=new Date(curYear,curMonth-1,1).toLocaleString('en-GB',{month:'long',year:'numeric'});
  renderDesktop();
  renderMobileGrid();
  renderDayPanel();
  buildLegend();
  renderConflicts();
}

// Desktop
function renderDesktop(){
  const tbody=document.getElementById('calBody');tbody.innerHTML='';
  const today=fmt(new Date());
  const cells=buildCells();
  for(let r=0;r<cells.length/7;r++){
    const tr=document.createElement('tr');
    for(let c=0;c<7;c++){
      const cell=cells[r*7+c];
      const td=document.createElement('td');
      const dayJobs=jobsForDate(cell.date);
      if(isTeamFull(dayJobs))td.style.outline='2px solid #E24B4A';
      td.addEventListener('click',()=>{if(isAdmin)openAddModalDate(cell.date);});
      const dn=document.createElement('div');
      dn.className='day-num'+(cell.other?' other-month':'')+(cell.date===today?' today':'');
      dn.textContent=parseInt(cell.date.split('-')[2]);
      td.appendChild(dn);
      dayJobs.forEach(j=>{
        const cat=getCat(j.cat);
        const bar=document.createElement('div');
        bar.className='job-bar';
        bar.style.background=cat.color+'33';
        bar.style.color=cat.color==='#F5C842'?'#7a6000':cat.color;
        bar.style.borderLeft=`2px solid ${cat.color}`;
        bar.textContent=(j.seqf?j.seqf+' - ':'')+j.name+(j.notes?' 📋':'')+' ('+(j.person==='Unassigned'?'⚠ Unassigned':j.person)+')';
        bar.addEventListener('click',e=>{e.stopPropagation();isAdmin?openEditModal(j.id):openViewModal(j.id);});
        td.appendChild(bar);
      });
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

// Mobile grid
function renderMobileGrid(){
  const grid=document.getElementById('calMobileGrid');grid.innerHTML='';
  const today=fmt(new Date());
  buildCells().forEach(cell=>{
    const dayJobs=jobsForDate(cell.date);
    const full=isTeamFull(dayJobs);
    const div=document.createElement('div');
    div.className='cal-mobile-cell'+(cell.other?' other-month':'')+(cell.date===today?' today':'')+(cell.date===selectedDate?' selected':'')+(full?' team-full':'');
    const num=document.createElement('div');
    num.className='cnum';
    num.textContent=parseInt(cell.date.split('-')[2]);
    div.appendChild(num);
    // colour dots for jobs
    if(dayJobs.length>0){
      const dots=document.createElement('div');
      dots.className='cal-mobile-dots';
      const unique=[...new Set(dayJobs.map(j=>getCat(j.cat).color))].slice(0,3);
      unique.forEach(color=>{
        const dot=document.createElement('div');
        dot.className='cal-mobile-dot';
        dot.style.background=color;
        dots.appendChild(dot);
      });
      div.appendChild(dots);
    }
    div.addEventListener('click',()=>{selectedDate=cell.date;renderMobileGrid();renderDayPanel();});    grid.appendChild(div);
  });
}

// Day panel
function renderDayPanel(){
  const d=toDate(selectedDate);
  const label=d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('dayPanelTitle').textContent=label;
  const addBtn=document.getElementById('dayPanelAdd');
  addBtn.style.display=isAdmin?'':'none';
  addBtn.onclick=()=>openAddModalDate(selectedDate);
  const container=document.getElementById('dayPanelJobs');
  container.innerHTML='';
  const dayJobs=jobsForDate(selectedDate);
  if(dayJobs.length===0){
    container.innerHTML='<div class="day-panel-empty">No jobs scheduled</div>';
    return;
  }
  dayJobs.forEach(j=>{
    const cat=getCat(j.cat);
    const card=document.createElement('div');
    card.className='day-card';
    card.style.borderLeftColor=cat.color;
    card.innerHTML=`<div class="day-card-title">${(j.seqf?j.seqf+' — ':'')+j.name+(j.notes?' 📋':'')}</div>
      <div class="day-card-meta">
        <span>👤 ${j.person==='Unassigned'?'⚠ Unassigned':j.person}</span>
        <span>🏷 ${cat.label}</span>
        ${j.pm?`<span>📋 PM: ${j.pm}</span>`:''}
        <span>📅 ${j.start} – ${j.end}</span>
      </div>`;
    card.addEventListener('click',()=>{isAdmin?openEditModal(j.id):openViewModal(j.id);});
    container.appendChild(card);
  });
}

function renderConflicts(){
  const conflicts=[];
  const checkable=jobs.filter(j=>!getCat(j.cat).noConflict);
  for(let i=0;i<checkable.length;i++){
    for(let k=i+1;k<checkable.length;k++){
      const a=checkable[i],b=checkable[k];
      if(a.person!==b.person)continue;
      const aS=toDate(a.start),aE=toDate(a.end),bS=toDate(b.start),bE=toDate(b.end);
      if(aS<=bE&&bS<=aE){
        const os=new Date(Math.max(aS,bS)),oe=new Date(Math.min(aE,bE));
        conflicts.push({person:a.person,job1:a.name,job2:b.name,from:fmt(os),to:fmt(oe)});
      }
    }
  }
  const list=document.getElementById('conflictList');
  const count=document.getElementById('conflictCount');
  count.textContent=conflicts.length+' issue'+(conflicts.length===1?'':'s');
  count.style.background=conflicts.length?'#FCEBEB':'#EAF3DE';
  count.style.color=conflicts.length?'#A32D2D':'#3B6D11';
  list.innerHTML=conflicts.length
    ?conflicts.map(c=>`<div class="conflict-item"><strong>${c.person}</strong>: <strong>${c.job1}</strong> and <strong>${c.job2}</strong> overlap ${c.from===c.to?'on '+c.from:'from '+c.from+' to '+c.to}</div>`).join('')
    :'<p class="no-conflicts">No double assignments.</p>';
}

function buildLegend(){
  const leg=document.getElementById('legend');leg.innerHTML='';
  CATEGORIES.forEach(c=>{
    const d=document.createElement('div');d.className='legend-item';
    d.innerHTML=`<span class="legend-swatch" style="background:${c.color}"></span>${c.label}${c.noConflict?'<span class="cat-note">(conflicts excluded)</span>':''}`;
    leg.appendChild(d);
  });
}

// Search
function onSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const dd=document.getElementById('searchDropdown');
  if(!q){dd.style.display='none';return;}
  const matches=jobs.filter(j=>
    j.name.toLowerCase().includes(q)||
    j.person.toLowerCase().includes(q)||
    (j.seqf&&j.seqf.toLowerCase().includes(q))||
    (j.pm&&j.pm.toLowerCase().includes(q))||
    (j.notes&&j.notes.toLowerCase().includes(q))
  );
  if(!matches.length){dd.innerHTML='<div style="padding:10px 12px;font-size:13px;color:#888">No jobs found</div>';dd.style.display='block';return;}
  dd.innerHTML=matches.map(j=>{
    const cat=getCat(j.cat);
    return`<div data-id="${j.id}" style="padding:9px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px">
      <span style="width:8px;height:8px;border-radius:2px;background:${cat.color};flex-shrink:0"></span>
      <div>
        <div style="font-size:13px;font-weight:500">${j.name}${j.seqf?` <span style="font-size:11px;color:#888;font-weight:400">${j.seqf}</span>`:''}</div>
        <div style="font-size:11px;color:#888">${j.person}${j.pm?' &middot; PM: '+j.pm:''} &middot; ${j.start} to ${j.end}</div>
      </div>
    </div>`;
  }).join('');
  dd.style.display='block';
  dd.querySelectorAll('[data-id]').forEach(el=>{
    el.addEventListener('click',()=>jumpToJob(el.dataset.id));
  });
}

function jumpToJob(id){
  const j=jobs.find(x=>x.id===id);
  if(!j)return;
  const d=toDate(j.start);
  curYear=d.getFullYear();curMonth=d.getMonth()+1;
  selectedDate=j.start;
  document.getElementById('searchInput').value='';
  document.getElementById('searchDropdown').style.display='none';
  render();
  setTimeout(()=>{
    const bars=[...document.querySelectorAll('.job-bar,.day-card')];
    const bar=bars.find(b=>b.textContent.includes(j.name));
    if(bar){bar.scrollIntoView({behavior:'smooth',block:'center'});bar.style.outline='2px solid #378ADD';setTimeout(()=>bar.style.outline='',1500);}
  },50);
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap'))
    document.getElementById('searchDropdown').style.display='none';
});
</script>
